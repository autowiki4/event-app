<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>You're all set — The Perfect Summer Day</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>:root{ --phase-color:var(--violet); --phase-color-deep:var(--violet-deep); }</style>
</head>
<body>
<div class="phone">
  <div class="progress" id="progress"></div>
  <section class="screen">
    <div class="attendee-banner">
      <div>
        <span class="attendee-label">Attendee</span>
        <strong id="done-attendee-name">Guest</strong>
        <span class="attendee-raffle" id="done-attendee-raffle">Raffle #----</span>
      </div>
      <div class="attendee-banner-actions"><span class="wristband-chip" id="done-wristband">Registered</span></div>
    </div>
    <div class="done-badge">✓</div>
    <p class="eyebrow" style="text-align:center;">Saved</p>
    <h1 class="display" style="text-align:center;">You're all set.</h1>
    <p class="lede" style="text-align:center;">Your selections are connected to your registration. No more questions—enjoy the rest of the event.</p>
    <ul class="summary-list" id="summary-list"></ul>
    <div id="booth-guides"></div>
    <div class="connect-card">
      <div class="kicker">Phase 3 complete</div>
      <h2>Thanks for being here.</h2>
      <p style="margin-bottom:0;">Keep your raffle number handy for the live drawing.</p>
    </div>
    <button class="btn btn-ghost" id="btn-restart" style="margin-top:16px;">Switch attendee</button>
  </section>
</div>

<script src="../shared/config.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/identity.js"></script>
<script src="../shared/attendee-portal.js"></script>
<script src="../shared/toast.js"></script>
<script src="../shared/booths-config.js"></script>
<script>
function renderProgress() {
  const el = document.getElementById("progress");
  el.innerHTML = "";
  for (let i = 0; i < 3; i += 1) {
    const dot = document.createElement("div");
    dot.className = "dot done";
    el.appendChild(dot);
  }
}
renderProgress();

let identity = Identity.peek();
const chosenIds = JSON.parse(sessionStorage.getItem("eventapp.chosen") || "[]");
const chosen = FINAL_OPTIONS.filter((option) => chosenIds.includes(option.id));

async function render() {
  document.getElementById("done-attendee-name").textContent = identity.name || "Guest";
  document.getElementById("done-attendee-raffle").textContent = `Raffle #${identity.raffleNumber || "----"}`;
  const color = wristbandColorById(identity.wristbandColor);
  const chip = document.getElementById("done-wristband");
  chip.textContent = color ? `${color.label} wristband` : "Registered";
  chip.style.setProperty("--wristband-color", color ? color.hex : "#8b97b8");

  let boothIds = [];
  try {
    const response = await EventAPI.myCheckins(identity.attendeeId);
    boothIds = response.boothIds || [];
  } catch (error) {
    if (Identity.restartIfMissing(error, "../phase3-signup/index.html")) return;
    console.warn(error);
  }

  const routeLength = routeForWristband(identity.wristbandColor).length || 3;
  const list = document.getElementById("summary-list");
  list.innerHTML = `
    <li>🎟️ Raffle entry <b>#${escapeHtml(identity.raffleNumber || "----")}</b> — keep it ready for the live drawing.</li>
    <li>📜 ${boothIds.length} of ${routeLength} scheduled booth visits marked complete.</li>
  `;
  if (!chosen.length) {
    list.innerHTML += "<li>Phase 3 finished with no additional selections.</li>";
  } else {
    chosen.forEach((option) => {
      list.innerHTML += `<li>✅ ${escapeHtml(option.title)}</li>`;
    });
  }

  const guides = document.getElementById("booth-guides");
  guides.innerHTML = "";
  chosen.filter((option) => option.guide).forEach((option) => {
    const guide = document.createElement("div");
    guide.className = "booth-guide";
    guide.style.marginTop = "10px";
    guide.innerHTML = `<div class="g-kicker">${escapeHtml(option.guide.kicker)}</div><div class="g-loc">${escapeHtml(option.guide.loc)}</div><div class="g-detail">${escapeHtml(option.guide.detail)}</div>`;
    guides.appendChild(guide);
  });
}

document.getElementById("btn-restart").addEventListener("click", () => {
  AttendeePortal.signOut("../phase3-signup/index.html");
});

async function initCompletePage() {
  if (!AttendeePortal.hasAccess("phase3")) {
    window.location.replace("../phase3-signup/index.html");
    return;
  }
  try {
    identity = await AttendeePortal.restore("phase3");
    render();
  } catch (error) {
    console.error(error);
    Identity.clear();
    window.location.replace("../phase3-signup/index.html");
  }
}

initCompletePage();
</script>
</body>
</html>
