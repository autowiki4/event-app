<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Art Therapy Table — The Perfect Summer Day</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
  :root{ --phase-color:var(--teal); --phase-color-deep:var(--teal-deep); }
  .beat-time{ font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--coral); text-transform:uppercase; margin-bottom:8px; }
  .beat-headline{ font-family:'Fraunces',serif; font-size:30px; line-height:1.08; margin:0 0 16px; }
  .verse-box{ border-left:4px solid var(--sun-deep); background:#fff9e9; border-radius:0 14px 14px 0; padding:16px; margin:16px 0; }
  .verse-box p{ font-family:'Fraunces',serif; font-style:italic; line-height:1.5; margin:0 0 8px; }
  .verse-ref{ font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; color:var(--coral-deep); text-transform:uppercase; letter-spacing:.06em; }
  .triangle-points{ display:grid; gap:9px; margin:14px 0; }
  .triangle-point{ display:flex; align-items:center; gap:12px; border:1px solid var(--line); border-radius:14px; padding:12px; background:#fff; }
  .triangle-number{ flex:0 0 29px; width:29px; height:29px; border-radius:50%; display:grid; place-items:center; background:var(--teal); color:#fff; font-weight:800; }
  .triangle-title{ font-weight:800; line-height:1.3; }
  .triangle-subtitle{ color:var(--ink-soft); font-size:13px; margin-top:2px; }
  .quiet-note{ border-radius:14px; padding:13px 14px; background:rgba(47,111,237,.08); color:var(--ink); font-weight:700; margin:14px 0; }
  .prompt-chips{ display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 18px; }
  .prompt-chip{ border:1px solid var(--line); border-radius:999px; padding:8px 11px; background:#fff; font-size:12.5px; font-weight:700; }
</style>
</head>
<body>

<div class="phone" id="phone">
  <div id="booth-room-content" style="display:none;">
    <div class="progress" id="progress"></div>
    <section class="screen">
      <p class="eyebrow">Phase 2 · Art Therapy room</p>
      <h1 class="display" style="display:flex; align-items:center; gap:10px;"><span>🖌️</span><em>Art Therapy Table</em></h1>
      <p class="lede">A guided drawing and reflection experience with the booth leader.</p>
    </section>

    <section id="booth-gate" class="screen">
      <div class="field">
        <label for="booth-phone-input">Your phone number to check in</label>
        <input id="booth-phone-input" type="tel" inputmode="numeric" autocomplete="tel-national" maxlength="14" placeholder="(555) 555-5555">
        <div class="hint">You'll only need to enter this once today.</div>
        <div class="err" id="err-booth-phone">Enter a 10-digit phone number.</div>
      </div>
      <button class="btn btn-primary" id="btn-booth-checkin">Check in to this room →</button>
    </section>

    <div id="booth-interface" style="display:none;">
      <section class="screen" style="padding-top:0;">
        <div id="booth-content"></div>
      </section>
      <section class="screen" style="padding-top:0;">
        <div class="field">
          <label for="booth-note">Anything you'd like to share?</label>
          <textarea id="booth-note" rows="2" placeholder="Type here..."></textarea>
        </div>
        <div class="field">
          <label>Rate this booth</label>
          <div class="stars" id="booth-stars">
            <span class="star" data-n="1">★</span><span class="star" data-n="2">★</span><span class="star" data-n="3">★</span><span class="star" data-n="4">★</span><span class="star" data-n="5">★</span>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-booth-done">Finish this booth →</button>
      </section>
    </div>
  </div>
</div>

<script src="../shared/config.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/pending-checkins.js"></script>
<script src="../shared/identity.js"></script>
<script src="../shared/journey-state.js"></script>
<script src="../shared/attendee-portal.js"></script>
<script src="../shared/attendee-menu.js"></script>
<script src="../shared/toast.js"></script>
<script src="../shared/booths-config.js"></script>
<script src="../shared/event-schedule.js"></script>
<script src="../shared/phone.js"></script>
<script src="../shared/booth-common.js"></script>
<script src="../shared/booth-room.js"></script>
<script>
const BOOTH_ID = "art";
const BOOTH_NAME = "Art Therapy Table";
const BOOTH_ROOM_NAME = "Art Therapy";
const ART_DRAFT_SCOPE = `booth.${BOOTH_ID}.activity`;
const artState = { index: 0, answers: {}, drafts: {} };
let artStateOwner = "";

function cleanArtEntries(value) {
  const allowed = new Set(ART_BEATS.map((beat) => beat.id));
  if (!value || typeof value !== "object" || Array.isArray(value)) return {};
  return Object.fromEntries(Object.entries(value)
    .filter(([key, entry]) => allowed.has(key) && typeof entry === "string")
    .map(([key, entry]) => [key, entry.slice(0, 120)]));
}

function restoreArtState() {
  const owner = String((Identity.peek() || {}).attendeeId || "");
  if (!owner || artStateOwner === owner) return;
  const saved = JourneyState.load(ART_DRAFT_SCOPE, {}) || {};
  const index = Number(saved.index);
  artState.index = Number.isInteger(index) ? Math.min(ART_BEATS.length - 1, Math.max(0, index)) : 0;
  artState.answers = cleanArtEntries(saved.answers);
  artState.drafts = cleanArtEntries(saved.drafts);
  artStateOwner = owner;
}

function saveArtState() {
  JourneyState.save(ART_DRAFT_SCOPE, {
    index: artState.index,
    answers: { ...artState.answers },
    drafts: { ...artState.drafts },
  });
}

function renderProgress() {
  const el = document.getElementById("progress");
  el.innerHTML = "";
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement("div");
    dot.className = "dot" + (i < 1 ? " done" : i === 1 ? " current" : "");
    el.appendChild(dot);
  }
}
renderProgress();

function renderArtRoom() {
  restoreArtState();
  const beat = ART_BEATS[artState.index];
  const answered = Object.prototype.hasOwnProperty.call(artState.answers, beat.id);
  let content = `
    <div class="beat-time">${escapeHtml(beat.time)}</div>
    <h2 class="beat-headline">${escapeHtml(beat.text)}</h2>
  `;

  if (beat.points) {
    content += `<div class="triangle-points">${beat.points.map((point, index) => `
      <div class="triangle-point">
        <div class="triangle-number">${index + 1}</div>
        <div>
          <div class="triangle-title">${escapeHtml(point.title)}</div>
          <div class="triangle-subtitle">${escapeHtml(point.sub)}</div>
        </div>
      </div>
    `).join("")}</div>`;
  }

  if (beat.verse) {
    content += `
      <div class="verse-box">
        <p>“${escapeHtml(beat.verse.text)}”</p>
        <div class="verse-ref">${escapeHtml(beat.verse.ref)}</div>
      </div>
    `;
  }

  if (beat.quiet) {
    content += `<div class="quiet-note">🤫&nbsp; ${escapeHtml(beat.quiet)}</div>`;
  }
  if (beat.chips) {
    content += `<div class="prompt-chips">${beat.chips.map((chip) => `<div class="prompt-chip">${escapeHtml(chip)}</div>`).join("")}</div>`;
  }

  if (beat.prompt) {
    content += `
      <div class="field">
        <label for="art-reflection-input">${escapeHtml(beat.prompt)}</label>
        <input id="art-reflection-input" type="text" maxlength="120" placeholder="${escapeHtml(beat.placeholder || "")}">
        ${beat.optional ? `<div class="hint">This reflection is optional.</div>` : ""}
      </div>
    `;
  }

  content += `
    <div class="poll-nav" style="margin-top:10px;">
      <button class="btn btn-ghost" id="btn-art-prev"${artState.index === 0 ? " style=\"visibility:hidden;\"" : ""}>← Back</button>
      <button class="btn btn-primary" id="btn-art-next">${artState.index === ART_BEATS.length - 1 ? "Continue to finish ↓" : "Next →"}</button>
    </div>
  `;

  document.getElementById("booth-content").innerHTML = content;
  const reflectionInput = document.getElementById("art-reflection-input");
  if (reflectionInput) {
    reflectionInput.value = Object.prototype.hasOwnProperty.call(artState.drafts, beat.id)
      ? artState.drafts[beat.id]
      : answered ? artState.answers[beat.id] : "";
    reflectionInput.addEventListener("input", () => {
      artState.drafts[beat.id] = reflectionInput.value;
      saveArtState();
    });
  }
  document.getElementById("btn-art-prev").addEventListener("click", () => {
    saveArtAnswer(beat);
    if (artState.index > 0) {
      artState.index--;
      saveArtState();
      renderArtRoom();
    }
  });
  document.getElementById("btn-art-next").addEventListener("click", () => {
    if (!saveArtAnswer(beat)) return;
    if (artState.index < ART_BEATS.length - 1) {
      artState.index++;
      saveArtState();
      renderArtRoom();
      return;
    }
    document.getElementById("btn-booth-done").scrollIntoView({ behavior: "smooth", block: "center" });
  });
}

function saveArtAnswer(beat) {
  const input = document.getElementById("art-reflection-input");
  if (!input) return true;
  const value = input.value.trim();
  if (!value && !beat.optional) {
    input.focus();
    return false;
  }
  if (value) artState.answers[beat.id] = value;
  else delete artState.answers[beat.id];
  artState.drafts[beat.id] = input.value;
  saveArtState();
  return true;
}

window.getBoothExtraData = () => {
  const reflections = {};
  ART_BEATS.forEach((beat) => {
    const value = String(artState.answers[beat.id] || artState.drafts[beat.id] || "").trim();
    if (value) reflections[beat.id] = value;
  });
  return { reachedBeat: ART_BEATS[artState.index].id, reflections };
};

initBoothRoom({ boothId: BOOTH_ID, boothName: BOOTH_NAME, roomName: BOOTH_ROOM_NAME, onReady: renderArtRoom });
renderBoothFooter(BOOTH_ID);
document.getElementById("btn-booth-done").addEventListener("click", () => finishBooth(BOOTH_ID, BOOTH_NAME));
</script>
</body>
</html>
