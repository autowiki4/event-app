<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Art Therapy Table — The Perfect Summer Day</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
  :root{ --phase-color:var(--teal); --phase-color-deep:var(--teal-deep); }
</style>
</head>
<body>

<div class="phone" id="phone">
  <div id="booth-room-content" style="display:none;">
    <div class="progress" id="progress"></div>
    <section class="screen">
      <p class="eyebrow">Phase 2 · Art Therapy room</p>
      <h1 class="display" style="display:flex; align-items:center; gap:10px;"><span>🖌️</span><em>Art Therapy Table</em></h1>
      <p class="lede">A guided drawing and reflection experience with the booth leader.</p>
    </section>

    <section id="booth-gate" class="screen">
      <div class="field">
        <label for="booth-phone-input">Your phone number to check in</label>
        <input id="booth-phone-input" type="tel" inputmode="numeric" autocomplete="tel-national" maxlength="14" placeholder="(555) 555-5555">
        <div class="hint">You'll only need to enter this once today.</div>
        <div class="err" id="err-booth-phone">Enter a 10-digit phone number.</div>
      </div>
      <button class="btn btn-primary" id="btn-booth-checkin">Check in to this room →</button>
    </section>

    <div id="booth-interface" style="display:none;">
      <section class="screen" style="padding-top:0;">
        <div id="booth-content"></div>
      </section>
      <section class="screen" style="padding-top:0;">
        <div class="field">
          <label for="booth-note">Anything you'd like to share?</label>
          <textarea id="booth-note" rows="2" placeholder="Type here..."></textarea>
        </div>
        <div class="field">
          <label>Rate this booth</label>
          <div class="stars" id="booth-stars">
            <span class="star" data-n="1">★</span><span class="star" data-n="2">★</span><span class="star" data-n="3">★</span><span class="star" data-n="4">★</span><span class="star" data-n="5">★</span>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-booth-done">Finish this booth →</button>
      </section>
    </div>
  </div>
</div>

<script src="../shared/config.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/identity.js"></script>
<script src="../shared/attendee-portal.js"></script>
<script src="../shared/toast.js"></script>
<script src="../shared/booths-config.js"></script>
<script src="../shared/phone.js"></script>
<script src="../shared/booth-common.js"></script>
<script src="../shared/booth-room.js"></script>
<script>
const BOOTH_ID = "art";
const BOOTH_NAME = "Art Therapy Table";
const BOOTH_ROOM_NAME = "Art Therapy";
let artPromptIndex = Math.floor(Math.random() * ART_PROMPTS.length);

function renderProgress() {
  const el = document.getElementById("progress");
  el.innerHTML = "";
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement("div");
    dot.className = "dot" + (i < 1 ? " done" : i === 1 ? " current" : "");
    el.appendChild(dot);
  }
}
renderProgress();

function renderArtRoom() {
  const prompt = ART_PROMPTS[artPromptIndex % ART_PROMPTS.length];
  document.getElementById("booth-content").innerHTML = `
    <div class="booth-guide" style="margin-bottom:16px;">
      <div class="g-kicker">Your guided prompt</div>
      <div class="g-loc">${escapeHtml(prompt)}</div>
      <div class="g-detail">Follow the booth leader's instructions and take your time with the reflection.</div>
    </div>
    <button class="btn btn-ghost" id="btn-next-art-prompt">Show a different prompt</button>
  `;
  document.getElementById("btn-next-art-prompt").addEventListener("click", () => {
    artPromptIndex = (artPromptIndex + 1) % ART_PROMPTS.length;
    renderArtRoom();
  });
}

window.getBoothExtraData = () => ({ promptShown: ART_PROMPTS[artPromptIndex % ART_PROMPTS.length] });

initBoothRoom({ boothId: BOOTH_ID, boothName: BOOTH_NAME, roomName: BOOTH_ROOM_NAME, onReady: renderArtRoom });
renderBoothFooter();
document.getElementById("btn-booth-done").addEventListener("click", () => finishBooth(BOOTH_ID, BOOTH_NAME));
</script>
</body>
</html>
