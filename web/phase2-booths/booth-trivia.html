<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Bible Bowl — The Perfect Summer Day</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
  :root{ --phase-color:var(--teal); --phase-color-deep:var(--teal-deep); }
  .trivia-content{ min-height:330px; }
  .trivia-stage{
    position:relative; overflow:hidden; padding:21px 18px; border:1.5px solid rgba(29,122,120,.24);
    border-radius:18px; background:#fff; box-shadow:var(--card-shadow);
  }
  .trivia-stage::before{
    content:""; position:absolute; width:160px; height:160px; right:-94px; top:-102px; border-radius:50%;
    background:radial-gradient(circle,rgba(240,168,60,.36),rgba(240,168,60,0) 70%); pointer-events:none;
  }
  .trivia-stage-icon{
    position:relative; display:grid; place-items:center; width:70px; height:70px; margin:2px auto 15px;
    border-radius:50%; background:linear-gradient(145deg,#fff3c9,#ffd77a); font-size:34px;
    box-shadow:0 16px 30px -22px rgba(122,78,15,.85);
  }
  .trivia-stage h2{
    position:relative; margin:0 0 8px; color:var(--ink); font-family:'Fraunces',serif;
    font-size:26px; line-height:1.15;
  }
  .trivia-stage-copy{ position:relative; margin:0; color:var(--ink-soft); font-size:14px; line-height:1.55; }
  .trivia-welcome{ text-align:center; background:linear-gradient(145deg,#fffdf6,#f4fbfa); }
  .trivia-welcome .status-pill{ margin-bottom:13px; }
  .trivia-host-note{
    position:relative; display:flex; align-items:center; gap:9px; margin-top:18px; padding:11px 12px;
    border-radius:12px; background:var(--parchment-dim); color:var(--teal-deep); font-size:12px;
    font-weight:700; line-height:1.4; text-align:left;
  }
  .trivia-question-meta{
    position:relative; display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin-bottom:15px; color:var(--teal-deep); font-family:'JetBrains Mono',monospace;
    font-size:9.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  }
  .trivia-category{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .trivia-question-count{ flex:none; color:var(--ink-soft); }
  .trivia-question{ position:relative; margin:0 0 17px; color:var(--ink); font-family:'Fraunces',serif; font-size:24px; line-height:1.22; }
  .trivia-choice{ position:relative; padding-right:42px; }
  .trivia-choice:disabled{ cursor:default; }
  .trivia-choice.is-selected-waiting{
    border-color:var(--violet); background:#f1ebfa; color:var(--violet-deep); box-shadow:0 0 0 2px rgba(108,78,150,.1);
  }
  .trivia-choice.is-correct{
    border-color:#2f8a57; background:#e5f6ea; color:#226a42; box-shadow:0 0 0 2px rgba(47,138,87,.1);
  }
  .trivia-choice.is-selected-wrong{ border-color:var(--coral); background:#fff0e9; color:#8b321f; }
  .trivia-choice-marker{ position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:17px; }
  .trivia-choice:not(.is-correct):not(.is-selected-wrong):disabled{ opacity:.58; }
  .trivia-answer-state{
    display:flex; align-items:flex-start; gap:11px; margin-top:15px; padding:13px 14px;
    border-radius:13px; font-size:12.5px; line-height:1.48;
  }
  .trivia-answer-state strong{ display:block; margin-bottom:2px; color:inherit; font-size:13px; }
  .trivia-answer-icon{ flex:none; font-size:22px; line-height:1; }
  .trivia-answer-state.waiting{ background:#f1ebfa; color:var(--violet-deep); }
  .trivia-answer-state.correct{ background:#e5f6ea; color:#226a42; }
  .trivia-answer-state.incorrect{ background:#fff0e9; color:#8b321f; }
  .trivia-prompt{ margin:12px 2px 0; color:var(--ink-soft); font-size:11.5px; line-height:1.45; }
  .trivia-results{ text-align:center; background:linear-gradient(145deg,#fffaf0,#eff9f6); }
  .trivia-score{
    position:relative; display:flex; align-items:baseline; justify-content:center; gap:7px; margin:5px 0 10px;
    color:var(--teal-deep); font-family:'JetBrains Mono',monospace;
  }
  .trivia-score strong{ font-size:42px; line-height:1; }
  .trivia-score span{ font-size:15px; font-weight:800; }
  .trivia-results .btn{ position:relative; margin-top:19px; }
  .trivia-podium{ position:relative; margin:18px 0 2px; padding:13px; border:1px solid rgba(29,122,120,.18); border-radius:14px; background:rgba(255,255,255,.76); text-align:left; }
  .trivia-podium h3{ margin:0 0 9px; color:var(--teal-deep); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; }
  .trivia-podium>div{ display:grid; gap:7px; }
  .trivia-podium article{ display:grid; grid-template-columns:28px minmax(0,1fr); align-items:center; gap:0 9px; padding:9px 10px; border-radius:10px; background:#fffaf0; }
  .trivia-podium article>span{ grid-row:1/3; font-size:21px; text-align:center; }
  .trivia-podium article strong{ overflow-wrap:anywhere; color:var(--ink); font-size:12.5px; }
  .trivia-podium article small{ color:var(--ink-soft); font-size:9.5px; }
  .trivia-podium-empty{ position:relative; margin:15px 0 0; color:var(--ink-soft); font-size:11px; }
  .trivia-sync-note{ margin:12px 2px 0; color:var(--ink-soft); font-size:10.5px; line-height:1.4; text-align:center; }
  .trivia-error{ text-align:center; }
  .trivia-error .btn{ margin-top:16px; }
  .trivia-loading-bars{ display:grid; gap:10px; margin-top:18px; }
  .trivia-loading-bars span{ height:48px; border-radius:12px; background:linear-gradient(90deg,#eee8d8,#faf7ed,#eee8d8); background-size:200% 100%; animation:triviaShimmer 1.3s linear infinite; }
  @keyframes triviaShimmer{ to{ background-position:-200% 0; } }
  @media (prefers-reduced-motion:reduce){ .trivia-loading-bars span{ animation:none; } }
</style>
</head>
<body>

<div class="phone" id="phone">
  <div id="booth-room-content" style="display:none;">
    <div class="progress" id="progress"></div>
    <section class="screen">
      <p class="eyebrow">Phase 2 · Bible Bowl room</p>
      <h1 class="display" style="display:flex; align-items:center; gap:10px;"><span>🏆</span><em>Bible Bowl</em></h1>
      <p class="lede">Your host sets the pace. Choose each answer, lock it in, and wait for the big reveal together.</p>
    </section>

    <section id="booth-gate" class="screen">
      <p class="eyebrow">Bible Bowl</p>
      <h2>Opening your activity…</h2>
      <p class="lede">Your event pass is already saved. No booth check-in details are needed.</p>
    </section>

    <div id="booth-interface" style="display:none;">
      <section class="screen" style="padding-top:0;">
        <div id="booth-content" class="trivia-content" role="region" aria-label="Bible Bowl question" aria-live="polite">
          <div class="trivia-stage" aria-busy="true">
            <p class="eyebrow">Joining Bible Bowl…</p>
            <div class="trivia-loading-bars" aria-hidden="true"><span></span><span></span><span></span></div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>

<script src="../shared/config.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/pending-checkins.js"></script>
<script src="../shared/identity.js"></script>
<script src="../shared/journey-state.js"></script>
<script src="../shared/attendee-portal.js"></script>
<script src="../shared/attendee-menu.js"></script>
<script src="../shared/toast.js"></script>
<script src="../shared/booths-config.js"></script>
<script src="../shared/event-schedule.js"></script>
<script src="../shared/phone.js"></script>
<script src="../shared/booth-common.js"></script>
<script src="../shared/booth-room.js"></script>
<script src="../shared/trivia-attendee.js"></script>
<script>
const BOOTH_ID = "trivia";
const BOOTH_NAME = "Bible Bowl";
const BOOTH_ROOM_NAME = "Bible Bowl";

function renderProgress() {
  const el = document.getElementById("progress");
  el.innerHTML = "";
  for (let i = 0; i < 3; i += 1) {
    const dot = document.createElement("div");
    dot.className = "dot" + (i < 1 ? " done" : i === 1 ? " current" : "");
    el.appendChild(dot);
  }
}
renderProgress();

initBoothRoom({
  boothId: BOOTH_ID,
  boothName: BOOTH_NAME,
  roomName: BOOTH_ROOM_NAME,
  onReady: () => TriviaAttendee.init({
    containerId: "booth-content",
    boothName: BOOTH_NAME,
    onCompleted: () => window.completeBoothRoom(BOOTH_NAME),
  }),
});
</script>
</body>
</html>
